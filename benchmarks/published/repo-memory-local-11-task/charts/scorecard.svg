<svg xmlns="http://www.w3.org/2000/svg" width="900" height="384" viewBox="0 0 900 384" role="img" aria-label="OpenBook repo memory benchmark scorecard">
<style>
text{font-family:Arial,Helvetica,sans-serif;fill:#111827}
.title{font-size:24px;font-weight:800}
.label{font-size:15px;font-weight:700}
.value{font-size:15px;font-weight:800}
.bg{fill:#eef2f7}
.bar{fill:#0f766e}
</style>
<rect width="900" height="384" fill="#ffffff"/>
<text class="title" x="28" y="38">OpenBook Repo Memory Scorecard</text>
<text class="label" x="28" y="92">HIT@1</text>
<rect class="bg" x="180" y="72" width="640" height="28" rx="3"/>
<rect class="bar" x="180" y="72" width="640" height="28" rx="3"/>
<text class="value" x="836" y="92">100.0</text>
<text class="label" x="28" y="146">HIT@3</text>
<rect class="bg" x="180" y="126" width="640" height="28" rx="3"/>
<rect class="bar" x="180" y="126" width="640" height="28" rx="3"/>
<text class="value" x="836" y="146">100.0</text>
<text class="label" x="28" y="200">MRR</text>
<rect class="bg" x="180" y="180" width="640" height="28" rx="3"/>
<rect class="bar" x="180" y="180" width="640" height="28" rx="3"/>
<text class="value" x="836" y="200">100.0</text>
<text class="label" x="28" y="254">CITATION</text>
<rect class="bg" x="180" y="234" width="640" height="28" rx="3"/>
<rect class="bar" x="180" y="234" width="640" height="28" rx="3"/>
<text class="value" x="836" y="254">100.0</text>
<text class="label" x="28" y="308">EXCLUSION</text>
<rect class="bg" x="180" y="288" width="640" height="28" rx="3"/>
<rect class="bar" x="180" y="288" width="640" height="28" rx="3"/>
<text class="value" x="836" y="308">100.0</text>
</svg>